# Gemini 335L Camera Configuration

# RGB 流配置
rgb:
  resolutions:
    - {width: 640, height: 480, fps: 30}
    - {width: 1280, height: 720, fps: 30}
    - {width: 1920, height: 1080, fps: 30}
  default: {width: 1280, height: 720, fps: 30}
  format: "MJPG"
  auto_exposure: false
  exposure: 10000
  gain: 100

# RGB-D 流配置
rgbd:
  color:
    width: 1280
    height: 720
    fps: 30
    format: "MJPG"
    auto_exposure: false
    exposure: 10000
    gain: 100
  depth:
    width: 640
    height: 480
    fps: 30
    format: "Y16"
    auto_exposure: false
    exposure: 10000
    gain: 100
  align: true
  min_depth_mm: 20
  max_depth_mm: 10000
  colormap: "JET"

# 输出配置
output:
  base_dir: "F:/Code/orbbecSDKv2/output/gemini_335L"
  color_format: "png"
  depth_format: "png"
  jpg_quality: 95
